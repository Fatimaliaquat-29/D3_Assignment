<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Interactive Dashboard - Assignment 3</title>
    <meta name="description" content="Interactive data visualization dashboard exploring Pokémon stats across all generations using D3.js">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="header-content">
                <h1>Pokémon Interactive Dashboard</h1>
                <p>Exploring stats of 1,005 Pokémon across all generations</p>
            </div>
        </header>

        <div class="controls-panel glassmorphism">

            <!-- FILTER interaction -->
            <div class="control-group">
                <label for="type-filter">🔍 Filter by Type:</label>
                <select id="type-filter">
                    <option value="All">All Types</option>
                    <!-- populated by JS -->
                </select>
            </div>

            <!-- RECONFIGURE: chart type -->
            <div class="control-group">
                <label for="main-chart-select">🔄 Chart Type:</label>
                <select id="main-chart-select">
                    <option value="scatter">Scatterplot</option>
                    <option value="bar">Bar Chart (Top 15)</option>
                </select>
            </div>

            <!-- ENCODE: scatterplot axes (hidden when bar chart active) -->
            <div id="scatter-encode-controls" style="display:contents;">
                <div class="control-group">
                    <label for="x-axis-select">📐 X-Axis (Encode):</label>
                    <select id="x-axis-select">
                        <option value="Attack">Attack</option>
                        <option value="Defense">Defense</option>
                        <option value="HP">HP</option>
                        <option value="Speed">Speed</option>
                        <option value="Sp. Atk">Sp. Atk</option>
                        <option value="Sp. Def">Sp. Def</option>
                        <option value="Total">Total</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="y-axis-select">📐 Y-Axis (Encode):</label>
                    <select id="y-axis-select">
                        <option value="Defense" selected>Defense</option>
                        <option value="Attack">Attack</option>
                        <option value="HP">HP</option>
                        <option value="Speed">Speed</option>
                        <option value="Sp. Atk">Sp. Atk</option>
                        <option value="Sp. Def">Sp. Def</option>
                        <option value="Total">Total</option>
                    </select>
                </div>
            </div>

            <!-- ENCODE: bar stat (only shown when bar chart active) -->
            <div id="bar-encode-control" class="control-group hidden">
                <label for="bar-stat-select">📊 Rank By (Encode):</label>
                <select id="bar-stat-select">
                    <option value="Attack">Attack</option>
                    <option value="Defense">Defense</option>
                    <option value="HP">HP</option>
                    <option value="Speed">Speed</option>
                    <option value="Sp. Atk">Sp. Atk</option>
                    <option value="Sp. Def">Sp. Def</option>
                    <option value="Total">Total</option>
                </select>
            </div>

            <!-- RECONFIGURE: sort order for type-count bar -->
            <div class="control-group">
                <label for="sort-select">↕ Sort Types:</label>
                <select id="sort-select">
                    <option value="Count">By Count</option>
                    <option value="Alphabetical">Alphabetical</option>
                </select>
            </div>

            <!-- ABSTRACT interaction -->
            <div class="control-group">
                <label>🌐 View Mode:</label>
                <button id="toggle-view" class="btn">Show Aggregated View</button>
            </div>
        </div>

        <div class="charts-container">
            <!-- Main chart: Scatterplot or Top-15 Bar -->
            <div class="chart-card glassmorphism">
                <div class="chart-header">
                    <h2 id="main-chart-title">Pokémon Stats Comparison</h2>
                    <span class="badge">Select · Encode · Elaborate · Abstract · Reconfigure</span>
                </div>
                <div id="scatterplot" class="svg-container"></div>
                <div id="topbarchart" class="svg-container hidden"></div>
            </div>

            <!-- Type-count bar: Connect + Filter -->
            <div class="chart-card glassmorphism">
                <div class="chart-header">
                    <h2>Pokémon Count by Type</h2>
                    <span class="badge">Connect · Filter · Reconfigure</span>
                </div>
                <div id="barchart" class="svg-container"></div>
            </div>
        </div>
    </div>

    <!-- Tooltip (Elaborate) -->
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="app.js?v=11"></script>
</body>
</html>
